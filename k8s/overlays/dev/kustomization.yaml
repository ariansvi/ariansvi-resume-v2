apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: resume-dev

namePrefix: dev-

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: frontend:dev
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: backend:dev
  - target:
      kind: ConfigMap
      name: backend-config
    patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: development
      - op: replace
        path: /data/LOG_LEVEL
        value: DEBUG
      - op: replace
        path: /data/CORS_ORIGINS
        value: "http://localhost:8080,http://localhost"
  - target:
      kind: Ingress
      name: resume-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: dev.ariansvi.com
      - op: remove
        path: /spec/rules/1
      - op: replace
        path: /spec/tls/0/hosts
        value:
          - dev.ariansvi.com
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/maxReplicas
        value: 1
