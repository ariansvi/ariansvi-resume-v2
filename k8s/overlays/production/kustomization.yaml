apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: resume

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

images:
  - name: frontend
    newName: us-central1-docker.pkg.dev/arian-svirsky-resume/resume/frontend
    newTag: "7541fce"
  - name: backend
    newName: us-central1-docker.pkg.dev/arian-svirsky-resume/resume/backend
    newTag: "7541fce"
