apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: resume-staging

namePrefix: staging-

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: ConfigMap
      name: backend-config
    patch: |
      - op: replace
        path: /data/ENVIRONMENT
        value: staging
      - op: replace
        path: /data/LOG_LEVEL
        value: DEBUG
      - op: replace
        path: /data/CORS_ORIGINS
        value: "https://staging.ariansvi.com"
  - target:
      kind: Ingress
      name: resume-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: staging.ariansvi.com
      - op: remove
        path: /spec/rules/1
      - op: replace
        path: /spec/tls/0/hosts
        value:
          - staging.ariansvi.com

images:
  - name: frontend
    newName: us-central1-docker.pkg.dev/ariansvi-resume/resume/frontend
    newTag: staging
  - name: backend
    newName: us-central1-docker.pkg.dev/ariansvi-resume/resume/backend
    newTag: staging
