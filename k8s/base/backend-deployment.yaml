apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: resume
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: ariansvi-resume
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: backend
      containers:
        - name: backend
          image: backend:latest
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: ENVIRONMENT
            - name: DATABASE_URL
              value: "sqlite:///./data/resume.db"
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: CORS_ORIGINS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: LOG_LEVEL
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
          securityContext:
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data
  namespace: resume
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: resume
data:
  ENVIRONMENT: "production"
  CORS_ORIGINS: "https://ariansvi.com,https://www.ariansvi.com"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: resume
  annotations:
    iam.gke.io/gcp-service-account: resume-backend@ariansvi-resume.iam.gserviceaccount.com
