name: Deploy / Rollback Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. a1b2c3d or latest)"
        required: true
        default: "latest"
      service:
        description: "Which service to deploy"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - frontend
          - backend

env:
  PROJECT_ID: arian-svirsky-resume
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/arian-svirsky-resume/resume

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: resume-ci-cd@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend
        if: ${{ github.event.inputs.service == 'both' || github.event.inputs.service == 'backend' }}
        run: |
          gcloud run deploy resume-backend \
            --image ${{ env.REGISTRY }}/backend:${{ github.event.inputs.image_tag }} \
            --region ${{ env.REGION }} \
            --quiet

      - name: Deploy frontend
        if: ${{ github.event.inputs.service == 'both' || github.event.inputs.service == 'frontend' }}
        run: |
          gcloud run deploy resume-frontend \
            --image ${{ env.REGISTRY }}/frontend:${{ github.event.inputs.image_tag }} \
            --region ${{ env.REGION }} \
            --quiet
