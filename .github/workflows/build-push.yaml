name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build-push.yaml"

env:
  PROJECT_ID: arian-svirsky-resume
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/arian-svirsky-resume/resume
  FRONTEND_SERVICE: resume-frontend
  BACKEND_SERVICE: resume-backend
  RUNTIME_SA: resume-backend@arian-svirsky-resume.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write

jobs:
  # Block deploys on failing CI. Inlined here (rather than via
  # workflow_run on the CI workflow) so we can gate the same commit's
  # tests directly without extra workflow plumbing.
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r app/backend/requirements.txt
      - name: Flake8
        run: cd app/backend && flake8 app/ tests/ --max-line-length=88
      - name: Mypy
        run: cd app/backend && mypy app/ --ignore-missing-imports
      - name: Pytest
        run: cd app/backend && pytest tests/ -v --tb=short

  build-and-deploy:
    name: Build & Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: resume-ci-cd@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          docker build \
            -t ${{ env.REGISTRY }}/backend:${TAG} \
            -t ${{ env.REGISTRY }}/backend:latest \
            app/backend/
          docker push ${{ env.REGISTRY }}/backend:${TAG}
          docker push ${{ env.REGISTRY }}/backend:latest

      - name: Build & push frontend
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          docker build \
            -t ${{ env.REGISTRY }}/frontend:${TAG} \
            -t ${{ env.REGISTRY }}/frontend:latest \
            app/frontend/
          docker push ${{ env.REGISTRY }}/frontend:${TAG}
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Deploy backend to Cloud Run
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image ${{ env.REGISTRY }}/backend:${TAG} \
            --region ${{ env.REGION }} \
            --service-account ${{ env.RUNTIME_SA }} \
            --quiet

      - name: Deploy frontend to Cloud Run
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.REGISTRY }}/frontend:${TAG} \
            --region ${{ env.REGION }} \
            --service-account ${{ env.RUNTIME_SA }} \
            --quiet
