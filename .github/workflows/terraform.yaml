name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yaml"
  push:
    branches: [main]
    paths:
      - "terraform/**"

env:
  TF_VERSION: "1.9"
  PROJECT_ID: arian-svirsky-resume

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: resume-ci-cd@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: cd terraform && terraform init

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_stats_password: ${{ secrets.STATS_PASSWORD }}
        run: |
          cd terraform
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt

      - name: Comment PR with plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const body = `## Terraform Plan
            \`\`\`
            ${plan.substring(0, 60000)}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: resume-ci-cd@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: cd terraform && terraform init

      - name: Terraform Apply
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_stats_password: ${{ secrets.STATS_PASSWORD }}
        run: cd terraform && terraform apply -auto-approve
