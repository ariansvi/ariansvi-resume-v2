services:
  frontend:
    build:
      context: ./app/frontend
      args:
        - HUGO_BASEURL=http://localhost:8080/
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - resume

  backend:
    build:
      context: ./app/backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - CORS_ORIGINS=http://localhost:8080,http://localhost
      - LOG_LEVEL=DEBUG
      - PORT=8000
      - STATS_USERNAME=${STATS_USERNAME:-arian}
      - STATS_PASSWORD=${STATS_PASSWORD:-devops2024}
    networks:
      - resume

networks:
  resume:
    driver: bridge
