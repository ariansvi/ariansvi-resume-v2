<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | absURL }}" />
<link rel="icon" type="image/png" sizes="512x512" href="{{ "favicon.png" | absURL }}" />
<link rel="shortcut icon" href="{{ "favicon.ico" | absURL }}" />
<link rel="apple-touch-icon" sizes="180x180" href="{{ "apple-touch-icon.png" | absURL }}" />
<meta name="theme-color" content="#eec35e" />

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title | default .Site.Title }}" />
<meta property="og:description" content="{{ .Description | default .Site.Params.description }}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:image" content="{{ "images/arian.png" | absURL }}" />
<meta property="og:site_name" content="{{ .Site.Title }}" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ .Title | default .Site.Title }}" />
<meta name="twitter:description" content="{{ .Description | default .Site.Params.description }}" />
<meta name="twitter:image" content="{{ "images/arian.png" | absURL }}" />

<style>
  /* Sticky header — hides on scroll down, shows on scroll up */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--background);
    transition: transform 0.3s ease;
  }

  .header--hidden {
    transform: translateY(-100%);
  }

  /* Hide logo decoration overflow (the vertical lines bug) */
  .header__inner {
    overflow: visible;
  }

  .header__logo {
    overflow: hidden;
  }

  /* Contact footer bar */
  .contact-footer {
    background: var(--background);
    border-top: 2px solid var(--accent);
    padding: 20px 0;
    text-align: center;
  }

  .contact-footer__links {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    list-style: none;
    padding: 0;
    margin: 10px 0;
  }

  .contact-footer__links a {
    color: var(--accent);
    text-decoration: none;
    font-weight: bold;
    padding: 8px 16px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    transition: all 0.2s ease;
    font-size: 0.9em;
    white-space: nowrap;
  }

  .contact-footer__links a:hover {
    background: var(--accent);
    color: var(--background);
  }

  @media (max-width: 768px) {
    .contact-footer__links {
      gap: 8px;
    }
    .contact-footer__links a {
      padding: 6px 12px;
      font-size: 0.85em;
    }
  }
</style>
